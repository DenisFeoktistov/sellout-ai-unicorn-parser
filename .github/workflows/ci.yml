name: ci

on:
  pull_request:
  push:
    branches: [master, main]

env:
  IMAGE_NAME: sellout-ai-unicorn-parser-ci
  CONTAINER_NAME: sellout-ai-unicorn-parser-ci

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t "$IMAGE_NAME" .

      - name: Start container
        run: docker run -d --name "$CONTAINER_NAME" -p 5000:5000 "$IMAGE_NAME"

      - name: Check health endpoint
        run: |
          for _ in {1..30}; do
            if ! docker ps --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
              docker logs "$CONTAINER_NAME"
              exit 1
            fi

            if curl -fsS http://127.0.0.1:5000/health | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              exit 0
            fi

            sleep 2
          done

          docker logs "$CONTAINER_NAME"
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "$CONTAINER_NAME" || true
